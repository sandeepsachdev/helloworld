        .field input, .field select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
        .field input:focus, .field select:focus { outline: none; border-color: #c05e00; }
        .field input { width: 200px; }

        /* Region tabs */
        .region-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
        .rtab { padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 0.82rem; font-weight: 600; border: 1px solid #ddd; background: white; color: #666; transition: all 0.15s; }
        .rtab:hover { border-color: #c05e00; color: #c05e00; }
        .rtab.active { background: #c05e00; color: white; border-color: #c05e00; }

        /* Stats bar */
        .stat-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .stat-box { background: white; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); padding: 12px 18px; flex: 1; min-width: 120px; }

        .stat-box .lbl { font-size: 0.75rem; color: #888; margin-top: 2px; }

        .view-btn { padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 0.82rem; color: #666; }
        .view-btn.active { background: #c05e00; color: white; border-color: #c05e00; }
        .sort-label { font-size: 0.8rem; color: #888; }
        .sort-select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.82rem; }
        .sort-select:focus { outline: none; border-color: #c05e00; }

        .suburb-card {
            background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.07);

        .card-band { height: 6px; }
        .card-inner { padding: 16px 18px; }
        .card-name { font-size: 1.05rem; font-weight: 700; color: #1a1a1a; }
        .card-meta { font-size: 0.78rem; color: #888; margin-top: 2px; }
        .card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }

        .mini-bar-fill { height: 6px; border-radius: 3px; background: #c05e00; }
        .mini-bar-val { width: 36px; text-align: right; color: #555; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }

        tbody tr:hover { background: #fde8d0; }
        tbody tr.selected { background: #ffd9b3; }

const REGIONS = ['All', ...Array.from(new Set(SUBURBS.map(s => s.region))).sort()];
let activeRegion = 'All';
let selectedSuburb = null;
let sortKey = 'name';
let wikiCache = {};

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmtPop(n) { return n >= 1000 ? (n/1000).toFixed(1)+'K' : n.toLocaleString(); }
function fmtMoney(n) { return '$' + n.toLocaleString(); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function density(s) { return (s.pop / s.area).toFixed(0); }

// Colour per region
const REGION_COLORS = {
    'City/Inner':      '#c05e00',
    'Inner West':      '#7c3aed',
    'Eastern':         '#0284c7',
    'North Shore':     '#0f766e',
    'Northern Beaches':'#0369a1',
    'Western':         '#b45309',
    'South West':      '#be185d',
    'Southern':        '#4f7942',
    'Hills/NW':        '#7c2d12',
};
function regionColor(r) { return REGION_COLORS[r] || '#888'; }

// ─── Sorting ──────────────────────────────────────────────────────────────────
function sorted(list) {
    const l = [...list];
    switch(sortKey) {
        case 'name':         return l.sort((a,b) => a.name.localeCompare(b.name));
        case 'pop_desc':     return l.sort((a,b) => b.pop - a.pop);
        case 'pop_asc':      return l.sort((a,b) => a.pop - b.pop);
        case 'income_desc':  return l.sort((a,b) => b.medIncome - a.medIncome);
        case 'income_asc':   return l.sort((a,b) => a.medIncome - b.medIncome);
        case 'age_desc':     return l.sort((a,b) => b.medAge - a.medAge);
        case 'age_asc':      return l.sort((a,b) => a.medAge - b.medAge);
        case 'overseas_desc':return l.sort((a,b) => b.pctOverseas - a.pctOverseas);
        case 'density_desc': return l.sort((a,b) => (b.pop/b.area) - (a.pop/a.area));
        default: return l;
    }
}

// ─── Region tabs ──────────────────────────────────────────────────────────────
function buildTabs() {
    document.getElementById('regionTabs').innerHTML = REGIONS.map(r =>
        `<div class="rtab ${r === activeRegion ? 'active' : ''}" onclick="setRegion('${escHtml(r)}')">${escHtml(r)}</div>`
    ).join('');
}
function setRegion(r) { activeRegion = r; buildTabs(); applyFilters(); }

// ─── Filter + render ──────────────────────────────────────────────────────────
function applyFilters() {
    sortKey = document.getElementById('sortSelect').value;
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const view = document.getElementById('viewSelect').value;

    let list = SUBURBS.filter(s => {
        if (activeRegion !== 'All' && s.region !== activeRegion) return false;
        if (q && !s.name.toLowerCase().includes(q) && !s.lga.toLowerCase().includes(q)) return false;
        return true;
    });
    list = sorted(list);

    updateStats(list);
    if (view === 'table') renderTable(list);
    else renderCards(list);

    // Re-render detail if selected suburb filtered out
    if (selectedSuburb && !list.find(s => s.name === selectedSuburb.name)) {
        selectedSuburb = null;
        document.getElementById('detailPanel').classList.add('hidden');
    }
}

function updateStats(list) {
    const totalPop = list.reduce((s,a) => s+a.pop, 0);
    const avgAge = list.length ? (list.reduce((s,a) => s+a.medAge, 0)/list.length).toFixed(0) : '—';
    const avgIncome = list.length ? Math.round(list.reduce((s,a) => s+a.medIncome, 0)/list.length) : 0;
    const avgOverseas = list.length ? (list.reduce((s,a) => s+a.pctOverseas, 0)/list.length).toFixed(0) : '—';
    document.getElementById('s1').textContent = list.length;
    document.getElementById('s2').textContent = fmtPop(totalPop);
    document.getElementById('s3').textContent = avgAge + ' yrs';
    document.getElementById('s4').textContent = fmtMoney(avgIncome);
    document.getElementById('s5').textContent = avgOverseas + '%';
}

// ─── Cards ────────────────────────────────────────────────────────────────────
function renderCards(list) {
    if (!list.length) {
        document.getElementById('listContainer').innerHTML = '<div class="empty-msg">No suburbs match your filters.</div>';

    }
    const maxPop = Math.max(...SUBURBS.map(s=>s.pop));

    <div class="suburb-card ${selectedSuburb && selectedSuburb.name===s.name ? 'selected' : ''}" onclick="selectSuburb('${escHtml(s.name)}')">

                <div class="cs"><div class="cv">${density(s)}</div><div class="cl">People / km²</div></div>
            </div>
            <div class="mini-bars">
                <div class="mini-bar-row">
                    <span class="mini-bar-label">Overseas-born</span>
                    <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${s.pctOverseas}%;background:${regionColor(s.region)}"></div></div>
                    <span class="mini-bar-val">${s.pctOverseas}%</span>
                </div>
                <div class="mini-bar-row">
                    <span class="mini-bar-label">Speak LOTE</span>
                    <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${s.pctLOTE}%;background:${regionColor(s.region)}"></div></div>
                    <span class="mini-bar-val">${s.pctLOTE}%</span>

    </div>`).join('');
    document.getElementById('listContainer').innerHTML = `<div class="cards-grid">${html}</div>`;
}

// ─── Table ────────────────────────────────────────────────────────────────────
let tSortCol = null, tSortDir = 1;
const COLS = [
    { key:'name',       label:'Suburb',           fmt: s => `<span class="td-name">${escHtml(s.name)}</span>` },
    { key:'region',     label:'Region',           fmt: s => `<span class="td-pill" style="background:${regionColor(s.region)}22;color:${regionColor(s.region)}">${escHtml(s.region)}</span>` },
    { key:'lga',        label:'LGA',              fmt: s => escHtml(s.lga) },
    { key:'postcode',   label:'Postcode',         fmt: s => s.postcode },
    { key:'pop',        label:'Population',       fmt: s => s.pop.toLocaleString() },
    { key:'area',       label:'Area km²',         fmt: s => s.area.toFixed(1) },
    { key:'density',    label:'Density /km²',     fmt: s => density(s) },
    { key:'medAge',     label:'Median Age',       fmt: s => s.medAge },
    { key:'medIncome',  label:'Wkly Income',      fmt: s => fmtMoney(s.medIncome) },
    { key:'pctOverseas',label:'% Overseas',       fmt: s => s.pctOverseas + '%' },
    { key:'pctLOTE',    label:'% LOTE',           fmt: s => s.pctLOTE + '%' },
];

function renderTable(list) {
    const head = COLS.map((c,i) => {
        const cls = tSortCol===i ? (tSortDir===1?'sort-desc':'sort-asc') : '';
        return `<th class="${cls}" onclick="tSort(${i})">${c.label}</th>`;
    }).join('');
    const body = list.map(s => {
        const sel = selectedSuburb && selectedSuburb.name===s.name ? 'selected' : '';
        return `<tr class="${sel}" onclick="selectSuburb('${escHtml(s.name)}')">${COLS.map(c=>`<td>${c.fmt(s)}</td>`).join('')}</tr>`;
    }).join('');
    document.getElementById('listContainer').innerHTML = `
    <div class="table-wrap">
        <table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>
    </div>`;
}

function tSort(i) {
    if (tSortCol===i) tSortDir=-tSortDir; else { tSortCol=i; tSortDir=1; }
    // Map col index to sort key
    const keyMap = ['name','region','lga','postcode','pop_desc','area','density','age_desc','income_desc','overseas_desc','lote'];
    // We just re-sort with the main sort mechanism approximated
    const col = COLS[i];
    const view = document.getElementById('viewSelect').value;
    // rebuild filtered list
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    let list = SUBURBS.filter(s => {
        if (activeRegion!=='All' && s.region!==activeRegion) return false;
        if (q && !s.name.toLowerCase().includes(q) && !s.lga.toLowerCase().includes(q)) return false;
        return true;
    });
    list.sort((a,b) => {
        let av, bv;
        if (col.key==='name')    { av=a.name;     bv=b.name; }
        else if (col.key==='region') { av=a.region; bv=b.region; }
        else if (col.key==='lga')    { av=a.lga;   bv=b.lga; }
        else if (col.key==='density'){ av=a.pop/a.area; bv=b.pop/b.area; }
        else { av=a[col.key]; bv=b[col.key]; }
        if (typeof av==='string') return av.localeCompare(bv)*tSortDir;
        return (av-bv)*tSortDir;
    });
    renderTable(list);
}

// ─── Detail panel ─────────────────────────────────────────────────────────────
function selectSuburb(name) {
    selectedSuburb = SUBURBS.find(s => s.name === name);
    applyFilters(); // re-render to show selection highlight
    showDetail(selectedSuburb);

}

                    <div class="br-label"><span>Australian-born</span><span>${100-s.pctOverseas}%</span></div>
                    <div class="bar-track"><div class="bar-fill" style="width:${100-s.pctOverseas}%;background:#aaa"></div></div>
                </div>
            </div>
        </div>
        <div class="wiki-section">
            <div class="section-title" style="color:${col};border-bottom-color:${col}22;margin-top:20px">About ${escHtml(s.name)}</div>
            <div id="wikiContent"><span class="wiki-spinner"></span> Loading from Wikipedia…</div>
        </div>
    </div>`;
    panel.classList.remove('hidden');
    loadWiki(s);
}

async function loadWiki(s) {
    const key = s.wiki;
    if (wikiCache[key]) { renderWiki(wikiCache[key]); return; }
    try {
        const resp = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(key)}`, { headers:{Accept:'application/json'} });
        if (!resp.ok) throw new Error(resp.status);
        const data = await resp.json();
        wikiCache[key] = data;
        renderWiki(data);
    } catch {
        document.getElementById('wikiContent').innerHTML = `<span style="color:#aaa;font-size:0.85rem">Wikipedia summary not available.</span>`;
    }
}

function renderWiki(data) {
    const thumb = data.thumbnail ? `<img class="wiki-thumb" src="${data.thumbnail.source}" alt="">` : '';
    const extract = data.extract ? escHtml(data.extract) : 'No description available.';
    const url = `https://en.wikipedia.org/wiki/${encodeURIComponent(data.title || '')}`;
    document.getElementById('wikiContent').innerHTML = `
        ${thumb}
        <p class="wiki-extract">${extract}</p>
        <a class="wiki-link" href="${url}" target="_blank" rel="noopener">Read full article on Wikipedia →</a>`;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
buildTabs();
applyFilters();
